<!DOCTYPE html>
<html lang="zh-CN" class="io-grey-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日热榜 | 小蛋饼杂货铺</title>
    <meta name="description" content="每日热榜，汇集全网热点资讯">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1296db;
            --bg: #f5f5f5;
            --sidebar-bg: #ffffff;
            --text: #333;
            --text-secondary: #666;
            --border: #e5e5e5;
        }

        .io-black-mode {
            --bg: #1a1a1a;
            --sidebar-bg: #252525;
            --text: #e0e0e0;
            --text-secondary: #999;
            --border: #3a3a3a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-dark); }

        .sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 200px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
            text-decoration: none;
        }

        .sidebar-menu { padding: 10px 0; }
        .sidebar-item { list-style: none; }

        .sidebar-item > a {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            color: var(--text);
            transition: all 0.2s;
            gap: 10px;
        }

        .sidebar-item > a:hover { background: rgba(18, 150, 219, 0.1); color: var(--primary); }
        .sidebar-item.active > a { background: rgba(18, 150, 219, 0.15); color: var(--primary); }

        .main-content { margin-left: 200px; min-height: 100vh; }

        .page-header {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 15px 30px;
            z-index: 50;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title .icon { color: #ff6b6b; }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            font-size: 1.2rem;
            transition: background 0.2s;
        }

        .theme-toggle:hover { background: var(--border); }

        .embed-container {
            padding: 20px 30px;
        }

        .embed-wrapper {
            background: var(--sidebar-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .embed-wrapper iframe {
            display: block;
            width: 100%;
            height: calc(100vh - 150px);
            min-height: 700px;
            border: none;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-left: 200px;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content, .footer { margin-left: 0; }
            .embed-wrapper iframe { min-height: 500px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="index.html">
                <span style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #5bc0de); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem;">📂</span>
                小蛋饼杂货铺
            </a>
        </div>
        <nav class="sidebar-menu">
            <ul style="list-style: none; padding: 0;">
                <li class="sidebar-item"><a href="index.html"><span>🏠</span> 首页</a></li>
                <li class="sidebar-item active"><a href="hotnews.html"><span>🔥</span> 今日热榜</a></li>
                <li class="sidebar-item"><a href="login.html"><span>👤</span> 登录/注册</a></li>
                <li class="sidebar-item"><a href="about.html"><span>📋</span> 关于本站</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="header-title">
                <span class="icon">🔥</span>
                <span>今日热榜</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
            </button>
        </div>

        <div class="embed-container">
            <div class="embed-wrapper">
                <iframe
                    src="https://www.addog.vip/#hot1"
                    title="今日热榜"
                    sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
                    loading="lazy">
                </iframe>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 小蛋饼专属导航 | <a href="index.html">返回首页</a></p>
    </footer>

    <script>
        function initTheme() {
            const saved = localStorage.getItem('theme');
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');

            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.remove('io-grey-mode');
                html.classList.add('io-black-mode');
                icon.textContent = '☀️';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');

            if (html.classList.contains('io-grey-mode')) {
                html.classList.remove('io-grey-mode');
                html.classList.add('io-black-mode');
                icon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.remove('io-black-mode');
                html.classList.add('io-grey-mode');
                icon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        initTheme();
    </script>
</body>
</html>
